name: Scheduled deploy

# Rebuilds the site daily so new Substack posts appear without manual deploys.
# Also runs on push to main, and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '0 13 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e6e4a20faf3aec9bfee0ada5060fbf75
          command: pages deploy dist --project-name=ishita-space --branch=main
